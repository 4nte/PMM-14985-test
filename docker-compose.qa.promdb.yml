---
# Layered on TOP of docker-compose.qa.yml in the positive-control run only.
# Activates VM's promdb subsystem by:
#   1. Mounting the synthetic TSDB blocks built by generate-blocks.sh.
#   2. Setting VM_prometheusDataPath, which the pmm-server's supervisord
#      template (--envflag.enable / --envflag.prefix=VM_) converts into
#      -prometheusDataPath=/srv/prometheus/data on the VM command line.
#
# Omitting this file gives the negative control: blocks are not mounted, the
# env var is absent, VM never opens promdb data, vm_promdb_*_count still
# increments via self-monitoring but _sum stays 0.

services:
  pmm-server:
    environment:
      - VM_prometheusDataPath=/srv/prometheus/data
    # NOTE: bind mount is read-write (NOT :ro). VM creates a lock file and
    # may delete blocks past -retentionPeriod at startup; a :ro mount panics
    # with "lock DB directory: ... read-only file system".
    volumes:
      - ./blocks:/srv/prometheus/data
