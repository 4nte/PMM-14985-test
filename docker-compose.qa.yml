---
# Self-contained QA stack for verifying the VMPromDBSeriesReadPerQuery
# telemetry entry. Two services: pmm-server and qa-receiver.
#
# This file alone is the negative-control mode (UNSET_PROMDB=1 in run-test.sh):
# pmm-server runs without -prometheusDataPath, VM's promdb subsystem starts
# but has no data source, vm_promdb_*_count still increments via self-monitoring
# but _sum stays 0, so the telemetry entry reports 0.
#
# Layer in docker-compose.qa.promdb.yml on top to activate promdb (the default
# positive-control mode). The two-file split is deliberate: it lets the
# negative-control run cleanly OMIT the env var (rather than setting it to an
# empty string, which VM's --envflag plumbing would translate to the literal
# "-prometheusDataPath=" CLI arg).
#
# Operator usage is via run-test.sh; the equivalent compose invocations are:
#
#   # positive control (default mode):
#   docker compose -f qa/promdb-telemetry/docker-compose.qa.yml \
#                  -f qa/promdb-telemetry/docker-compose.qa.promdb.yml up -d
#
#   # negative control (UNSET_PROMDB=1 mode):
#   docker compose -f qa/promdb-telemetry/docker-compose.qa.yml up -d

services:
  pmm-server:
    image: ${PMM_SERVER_IMAGE:-percona/pmm-server:3}
    platform: linux/amd64
    container_name: qa-pmm-server
    hostname: qa-pmm-server
    restart: unless-stopped
    environment:
      - PMM_PUBLIC_ADDRESS=localhost
      - PMM_ENABLE_TELEMETRY=1
      - PMM_DEV_TELEMETRY_INTERVAL=60s
      - PMM_DEV_TELEMETRY_DISABLE_START_DELAY=true
      # Override the embedded telemetry config with the v3-branch HEAD copy
      # so the entry under verification (VMPromDBSeriesReadPerQuery) is
      # actually present even when running an older released pmm-server image
      # whose embedded config predates the entry.
      - PMM_DEV_TELEMETRY_FILE=/srv/qa-telemetry/config.yml
      - PMM_DEV_PERCONA_PLATFORM_ADDRESS=${QA_PROMDB_PLATFORM_ADDRESS:-http://qa-receiver:8080}
      - PMM_DEV_PERCONA_PLATFORM_INSECURE=true
    ports:
      - "${PMM_PORT_HTTPS:-8443}:8443"
    volumes:
      - pmm-data:/srv
      - ../../managed/services/telemetry/config.default.yml:/srv/qa-telemetry/config.yml:ro
    depends_on:
      qa-receiver:
        condition: service_started
        required: false

  qa-receiver:
    build:
      context: ./receiver
    container_name: qa-receiver
    hostname: qa-receiver
    restart: unless-stopped
    ports:
      - "18080:8080"
    volumes:
      - ./captures:/captures

volumes:
  pmm-data:
    name: pmm-promdb-qa-data
