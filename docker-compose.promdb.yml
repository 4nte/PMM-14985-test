---
# Override compose file. Layer on top of your PMM stack to enable promdb
# and mount the pre-generated TSDB blocks. Service name must match your
# base compose (defaults to `pmm-server`).
#
# Run from this directory so ${PWD} resolves to the blocks/ alongside this file:
#   docker compose -f /path/to/your/pmm-compose.yml \
#                  -f docker-compose.promdb.yml --profile pmm up -d

services:
  pmm-server:
    environment:
      - VM_prometheusDataPath=/srv/prometheus/data
    volumes:
      - ${PWD}/blocks:/srv/prometheus/data
