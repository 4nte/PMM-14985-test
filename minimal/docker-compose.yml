---
# Minimal stack for verifying the VMPromDBSeriesReadPerQuery telemetry entry
# (PMM-14985). Telemetry is routed to check-dev.percona.com; final report
# inspection happens via Percona internal tooling. See README.md for steps.
#
# Mounts:
#   ./blocks  -> /srv/prometheus/data   (rw; VM creates a lock file)
#   ../../managed/services/telemetry/config.default.yml
#             -> /srv/qa-telemetry/config.yml (ro; HEAD telemetry config from
#                the PMM-14985-add-promdb-telemetry branch)

services:
  pmm-server:
    image: ${PMM_SERVER_IMAGE:-percona/pmm-server:3}
    platform: linux/amd64
    container_name: qa-pmm-server-minimal
    hostname: qa-pmm-server-minimal
    restart: unless-stopped
    environment:
      - PMM_PUBLIC_ADDRESS=localhost
      - PMM_ENABLE_TELEMETRY=1
      - PMM_DEV_TELEMETRY_INTERVAL=60s
      - PMM_DEV_TELEMETRY_DISABLE_START_DELAY=true
      - PMM_DEV_TELEMETRY_FILE=/srv/qa-telemetry/config.yml
      - PMM_DEV_PERCONA_PLATFORM_ADDRESS=https://check-dev.percona.com
      - PMM_DEV_PERCONA_PLATFORM_INSECURE=true
      # The flag under test. Supervisord's --envflag.enable / --envflag.prefix=VM_
      # converts this to -prometheusDataPath=/srv/prometheus/data on VM's CLI,
      # which makes VictoriaMetrics open the bind-mounted historical TSDB blocks.
      - VM_prometheusDataPath=/srv/prometheus/data
    ports:
      - "8443:8443"
    volumes:
      - pmm-data:/srv
      - ./blocks:/srv/prometheus/data
      - ../../managed/services/telemetry/config.default.yml:/srv/qa-telemetry/config.yml:ro

volumes:
  pmm-data:
    name: pmm-promdb-minimal-data
